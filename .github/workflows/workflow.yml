name: workflow.yml
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: flatt-security/setup-takumi-guard-npm@v1
        # bot-id なし（匿名モード、ブロックのみ）

      - run: yarn install
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
